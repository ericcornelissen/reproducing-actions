name: addnab/docker-run-action
on:
  pull_request:
    paths:
      - .github/workflows/reusable-docker-test.yml
      - .github/workflows/addnab-docker-run-action.yml
  push:
    branches:
      - main
    paths:
      - .github/workflows/reusable-docker-test.yml
      - .github/workflows/addnab-docker-run-action.yml
  schedule:
    - cron: "56 1 * * *"
  workflow_dispatch: ~

permissions: read-all

jobs:
  test:
    uses: ./.github/workflows/reusable-docker-test.yml
    with:
      dockerfile: Dockerfile
      repository: addnab/docker-run-action
  version:
    if: ${{ false }}
    runs-on: ubuntu-latest
    steps:
      - uses: addnab/docker-run-action@v3
