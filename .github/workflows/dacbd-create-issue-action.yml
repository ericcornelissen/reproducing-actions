name: dacbd/create-issue-action
on:
  pull_request:
    paths:
      - .github/workflows/reusable-node-test.yml
      - .github/workflows/dacbd-create-issue-action.yml
  push:
    branches:
      - main
    paths:
      - .github/workflows/reusable-node-test.yml
      - .github/workflows/dacbd-create-issue-action.yml
  schedule:
    - cron: "54 1 * * *"
  workflow_dispatch: ~

permissions: read-all

jobs:
  test:
    uses: ./.github/workflows/reusable-node-test.yml
    with:
      build-cmd:    npm run build
      install-cmd:  npm install
      node-version: 20
      repository:   dacbd/create-issue-action
  version:
    if: ${{ false }}
    runs-on: ubuntu-latest
    steps:
      - uses: dacbd/create-issue-action@v2.0.0
