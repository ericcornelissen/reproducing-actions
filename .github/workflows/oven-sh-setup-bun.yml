name: oven-sh/setup-bun
on:
  pull_request:
    paths:
      - .github/workflows/reusable-node-test.yml
      - .github/workflows/oven-sh-setup-bun.yml
  push:
    branches:
      - main
    paths:
      - .github/workflows/reusable-node-test.yml
      - .github/workflows/oven-sh-setup-bun.yml
  schedule:
    - cron: "52 1 * * *"
  workflow_dispatch: ~

permissions: read-all

jobs:
  test:
    uses: ./.github/workflows/reusable-node-test.yml
    with:
      build-cmd:   bun build
      install-cmd: bun install
      bun-version: latest
      repository:  oven-sh/setup-bun
  version:
    if: ${{ false }}
    runs-on: ubuntu-latest
    steps:
      - uses: oven-sh/setup-bun@v2.2.0
