name: Platane/snk
on:
  pull_request:
    paths:
      - .github/workflows/reusable-docker-image-test.yml
      - .github/workflows/platane-snk.yml
  push:
    branches:
      - main
    paths:
      - .github/workflows/reusable-docker-image-test.yml
      - .github/workflows/platane-snk.yml
  schedule:
    - cron: "55 1 * * *"
  workflow_dispatch: ~

permissions: read-all

jobs:
  test:
    uses: ./.github/workflows/reusable-docker-image-test.yml
    with:
      dockerfile: Dockerfile
      image:      platane/snk@sha256:b107f810d467a26b1e7ac46751073d1247728421155a47e77f6cd2dc66dcc74c
      repository: Platane/snk
  version:
    if: ${{ false }}
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3.4.1
