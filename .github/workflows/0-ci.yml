name: Check
on:
  pull_request: ~
  push:
    branches:
      - main

permissions: read-all

jobs:
  check:
    name: ${{ matrix.what }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - what: GitHub Actions
            how: |
              actionlint
          - what: Shell scripts
            how: |
              shellcheck new.sh remove.sh
          - what: Formatting
            how: |
              shfmt --simplify --diff new.sh remove.sh
          - what: Schedules
            how: |
              duplicates=$( \
                grep -Rho '^[[:space:]]*- cron: ".*"' .github/workflows/*.yml \
                  | sed 's/.*cron: "\(.*\)"/\1/' \
                  | sort \
                  | uniq -d \
              )
              if [[ -n $duplicates ]]; then
                echo 'The following cron values appear multiple times:'
                echo "$duplicates"
                exit 1
              fi
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install tooling
        uses: asdf-vm/actions/install@b7bcd026f18772e44fe1026d729e1611cc435d47 # v4.0.1
      - name: ${{ matrix.what }}
        run: ${{ matrix.how }}
  gha-release:
    name: GitHub Actions Release Immutability
    runs-on: ubuntu-24.04
    if: ${{ github.event_name == 'pull_request' && startsWith(github.event.pull_request.head.ref || github.ref_name, 'dependabot/github_actions/') }}
    permissions:
      pull-requests: write # To comment on a Pull Request
    steps:
      - name: Parse
        id: parse
        shell: bash
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          REPO=$(echo "${TITLE}" | awk -F' ' '{print $2}')
          OLD=$(echo "${TITLE}" | awk -F' ' '{print $4}')
          NEW=$(echo "${TITLE}" | awk -F' ' '{print $6}')

          {
            echo "repo=$REPO"
            echo "new=$NEW"
            echo "old=$OLD"
          } >>"$GITHUB_OUTPUT"
      - name: Check
        id: check
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          NEW: ${{ steps.parse.outputs.new }}
          NUMBER: ${{ github.event.pull_request.number }}
          OLD: ${{ steps.parse.outputs.old }}
          THAT_REPO: ${{ steps.parse.outputs.repo }}
          THIS_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          WAS_IMMUTABLE=$(gh release view "v${OLD}" --repo "${THAT_REPO}" --json isImmutable | jq .isImmutable)
          IS_IMMUTABLE=$(gh release view "v${NEW}" --repo "${THAT_REPO}" --json isImmutable | jq .isImmutable)

          echo "::debug::was ${WAS_IMMUTABLE}; is ${IS_IMMUTABLE}"
          case "${WAS_IMMUTABLE};${IS_IMMUTABLE}" in
          'true;true')
            COMMENT=""
            ;;
          'false;false')
            COMMENT="${OLD} was not an immutable release and ${NEW} still is not. :neutral_face:"
            ;;
          'true;false')
            COMMENT="${OLD} was an immutable release but ${NEW} is not. :cry:"
            ;;
          'false;true')
            COMMENT="${OLD} was not an immutable release but ${NEW} is! :smile:"
            ;;
          esac

          exists=$(gh pr view "${NUMBER}" --repo "${THIS_REPO}" --json comments | jq --raw-output --arg comment "${COMMENT}" 'any(.comments[].body; . == $comment)')
          if [[ ${exists} == 'true' ]]; then
            echo '::debug::comment exists, not commenting again'
            SKIP='true'
          else
            echo '::debug::comment does not yet exists'
            SKIP='false'
          fi

          echo "comment=${COMMENT}" >>"$GITHUB_OUTPUT"
          echo "skip=${SKIP}" >>"$GITHUB_OUTPUT"
      - name: Comment
        if: ${{ steps.check.outputs.comment != '' && steps.check.outputs.skip == 'false' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          COMMENT: ${{ steps.check.outputs.comment }}
          NUMBER: ${{ github.event.pull_request.number }}
          THIS_REPO: ${{ github.repository }}
        run: |
          gh pr comment "${NUMBER}" --repo "${THIS_REPO}" --body "${COMMENT}"
